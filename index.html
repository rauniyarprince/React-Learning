<!doctype html>
<!-- Declares the document type as HTML5 -->

<html lang="en">
<!-- Root element of the HTML page, language is set to English -->

  <head>
    <!-- Head section contains meta info, links, and the page title -->

    <meta charset="UTF-8" />
    <!-- Sets character encoding to UTF-8 to support all characters -->

    <link rel="icon" type="image/svg+xml" href="/faviconn.svg" />
    <!-- Sets the favicon (small icon in browser tab) using an SVG file -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Makes the page responsive on mobile devices by setting the viewport width 
         equal to the device width and initial zoom level to 1 -->

    <title>myfirstproject</title>
    <!-- Sets the page title that appears in the browser tab -->
  </head>

  <body>
    <!-- Body section contains the visible content of the webpage -->

    <div id="root"></div>
    <!-- This is the container where the React app will be rendered -->
    
    <script type="module" src="/src/main.jsx"></script>
    <!-- Loads the main React JavaScript file (ES module) which starts the React app -->
  </body>

</html>
